<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVERSE — Cyberpunk Platformer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  #ui {
    width: 900px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: rgba(0,0,0,0.8);
    border: 1px solid #ff00ff;
    border-bottom: none;
    box-shadow: 0 0 20px #ff00ff44, inset 0 0 20px #ff00ff11;
  }

  .ui-item {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: #00ffff;
    text-shadow: 0 0 8px #00ffff;
    letter-spacing: 2px;
  }

  .ui-item span {
    color: #ff00ff;
    text-shadow: 0 0 8px #ff00ff;
  }

  #gameCanvas {
    display: block;
    border: 1px solid #ff00ff;
    box-shadow: 0 0 40px #ff00ff66, 0 0 80px #ff00ff22;
    cursor: none;
  }

  #overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }

  #overlay h1 {
    font-family: 'Orbitron', monospace;
    font-size: 56px;
    font-weight: 900;
    color: #ffffff;
    text-shadow: 0 0 20px #ffffff, 0 0 40px #ffffff88, 0 0 80px #ff00ff44;
    letter-spacing: 8px;
    animation: flicker 3s infinite;
  }

  #overlay .sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: #00ffff;
    text-shadow: 0 0 10px #00ffff;
    letter-spacing: 4px;
    margin-top: 8px;
    animation: pulse 1.5s infinite;
  }

  #overlay .controls-hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #ff00ff99;
    letter-spacing: 2px;
    margin-top: 20px;
    line-height: 1.8;
  }

  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.4; }
    97% { opacity: 1; }
    98% { opacity: 0.2; }
    99% { opacity: 1; }
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #scanlines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 5;
  }

  #wrapper {
    position: relative;
  }
</style>
</head>
<body>

<div id="ui">
  <div class="ui-item">SCORE <span id="scoreDisplay">000000</span></div>
  <div class="ui-item">VIVERSE <span style="color:#ffff00;text-shadow:0 0 8px #ffff00;">v1.0</span></div>
  <div class="ui-item">LIVES <span id="livesDisplay">♥ ♥ ♥</span></div>
  <div class="ui-item">LEVEL <span id="levelDisplay">01</span></div>
</div>

<div id="wrapper">
  <canvas id="gameCanvas" width="900" height="500"></canvas>
  <div id="scanlines"></div>
  <div id="overlay" id="overlay">
    <h1>VIVERSE</h1>
    <div class="sub">CYBERPUNK CHRONICLES // 1987</div>
    <div class="controls-hint">
      [ ARROW KEYS / WASD ] MOVE &nbsp;&nbsp; [ SPACE / UP ] JUMP<br>
      [ PRESS SPACE TO JACK IN ]
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreDisplay = document.getElementById('scoreDisplay');
const livesDisplay = document.getElementById('livesDisplay');
const levelDisplay = document.getElementById('levelDisplay');

const W = canvas.width;
const H = canvas.height;

// ─── STATE ───────────────────────────────────────────────
let gameState = 'title'; // title | playing | dead | win
let score = 0;
let lives = 3;
let keys = {};
let particles = [];
let glitchTimer = 0;

// ─── COLORS ──────────────────────────────────────────────
const C = {
  magenta: '#ff00ff',
  cyan: '#00ffff',
  yellow: '#ffff00',
  darkBg: '#1a0800',
  gridLine: '#5a1800',
  platform: '#0d0d2b',
  platformEdge: '#ff00ff',
  playerBody: '#00ffff',
  playerAccent: '#ff00ff',
  enemy: '#ff3300',
  enemyGlow: '#ff330088',
  coin: '#ffff00',
  coinGlow: '#ffff0088',
};

// ─── LEVEL DATA ───────────────────────────────────────────
const LEVELS = [
  {
    platforms: [
      {x:0,   y:460, w:300, h:20},
      {x:350, y:460, w:200, h:20},
      {x:600, y:460, w:300, h:20},
      // floating
      {x:80,  y:370, w:120, h:14},
      {x:260, y:300, w:100, h:14},
      {x:420, y:340, w:120, h:14},
      {x:580, y:270, w:130, h:14},
      {x:740, y:330, w:110, h:14},
      {x:620, y:390, w:80,  h:14},
      {x:160, y:230, w:100, h:14},
      {x:350, y:200, w:90,  h:14},
      {x:520, y:170, w:100, h:14},
      {x:700, y:180, w:120, h:14},
    ],
    coins: [
      {x:100,y:340},{x:130,y:340},{x:160,y:340},
      {x:280,y:270},{x:310,y:270},
      {x:440,y:310},{x:470,y:310},{x:500,y:310},
      {x:600,y:240},{x:635,y:240},{x:665,y:240},
      {x:760,y:300},{x:790,y:300},
      {x:175,y:200},{x:200,y:200},
      {x:370,y:170},{x:395,y:170},
      {x:540,y:140},{x:565,y:140},
      {x:720,y:150},{x:745,y:150},
    ],
    enemies: [
      {x:400, y:440, dir:1, speed:1.2},
      {x:620, y:440, dir:-1, speed:1.5},
      {x:290, y:280, dir:1, speed:1.0, platIndex:5},
      {x:600, y:250, dir:-1, speed:1.3, platIndex:6},
      {x:760, y:310, dir:1, speed:1.1, platIndex:8},
    ],
    goal: {x:860, y:400},
    bgSign: 'VIVERSE',
    playerStart: {x:40, y:410},
  }
];

let currentLevel = 0;
let level, player, enemies, coins, goal;

// ─── INIT LEVEL ───────────────────────────────────────────
function initLevel() {
  const ld = LEVELS[currentLevel];
  level = {
    platforms: ld.platforms.map(p => ({...p})),
  };
  player = {
    x: ld.playerStart.x,
    y: ld.playerStart.y,
    w: 22, h: 32,
    vx: 0, vy: 0,
    onGround: false,
    facing: 1,
    animFrame: 0,
    animTimer: 0,
    dead: false,
    invincible: 0,
    jumpBuffer: 0,
  };
  enemies = ld.enemies.map(e => ({
    ...e,
    startX: e.x,
    w: 24, h: 24,
    vy: 0,
    onGround: false,
    dead: false,
    deadTimer: 0,
    animFrame: 0,
    animTimer: 0,
  }));
  coins = ld.coins.map(c => ({...c, w:14, h:14, collected:false, anim:0}));
  goal = {...ld.goal, w:30, h:50, anim:0};
  levelDisplay.textContent = String(currentLevel+1).padStart(2,'0');
}

// ─── PHYSICS ─────────────────────────────────────────────
const GRAVITY = 0.55;
const JUMP_FORCE = -13;
const SPEED = 3.8;

function applyPhysics(entity) {
  entity.vy += GRAVITY;
  entity.x += entity.vx;
  entity.y += entity.vy;
  entity.onGround = false;

  for (const p of level.platforms) {
    if (
      entity.x + entity.w > p.x &&
      entity.x < p.x + p.w &&
      entity.y + entity.h > p.y &&
      entity.y + entity.h < p.y + p.h + Math.abs(entity.vy) + 2 &&
      entity.vy >= 0
    ) {
      entity.y = p.y - entity.h;
      entity.vy = 0;
      entity.onGround = true;
    }
  }

  if (entity.x < 0) entity.x = 0;
  if (entity.x + entity.w > W) entity.x = W - entity.w;
}

// ─── PARTICLE ────────────────────────────────────────────
function spawnParticles(x, y, color, count=8) {
  for (let i=0; i<count; i++) {
    const angle = (Math.PI*2/count)*i + Math.random()*0.5;
    const speed = 2 + Math.random()*4;
    particles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      life: 1,
      decay: 0.03 + Math.random()*0.04,
      size: 2 + Math.random()*4,
      color,
    });
  }
}

// ─── UPDATE ───────────────────────────────────────────────
let lastTime = 0;
function update(ts) {
  const dt = Math.min((ts - lastTime)/16.67, 3);
  lastTime = ts;

  if (gameState !== 'playing') {
    requestAnimationFrame(update);
    draw();
    return;
  }

  glitchTimer--;

  // Player input
  const left  = keys['ArrowLeft']  || keys['KeyA'];
  const right = keys['ArrowRight'] || keys['KeyD'];
  const jump  = keys['Space'] || keys['ArrowUp'] || keys['KeyW'];

  if (left)  { player.vx = -SPEED; player.facing = -1; }
  else if (right) { player.vx = SPEED; player.facing = 1; }
  else { player.vx *= 0.75; }

  if (player.jumpBuffer > 0) player.jumpBuffer--;
  if (jump && player.onGround) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    spawnParticles(player.x + player.w/2, player.y + player.h, C.cyan, 6);
  }

  applyPhysics(player);

  // Anim
  if (Math.abs(player.vx) > 0.5) {
    player.animTimer++;
    if (player.animTimer > 8) { player.animTimer=0; player.animFrame=(player.animFrame+1)%4; }
  } else { player.animFrame = 0; }

  if (player.invincible > 0) player.invincible--;

  // Fall death
  if (player.y > H + 50) {
    playerDie();
  }

  // Enemies
  for (const e of enemies) {
    if (e.dead) {
      e.deadTimer--;
      if (e.deadTimer <= 0) e.remove = true;
      continue;
    }
    e.vx = e.dir * e.speed;
    applyPhysics(e);

    // Bounce at edges of platform if assigned
    if (e.platIndex !== undefined) {
      const p = level.platforms[e.platIndex];
      if (e.x <= p.x) { e.dir = 1; e.x = p.x; }
      if (e.x + e.w >= p.x + p.w) { e.dir = -1; e.x = p.x + p.w - e.w; }
    } else {
      if (e.x <= 0 || e.x + e.w >= W) e.dir *= -1;
      // bounce at platform edges on ground
      if (e.onGround) {
        let onPlat = false;
        for (const p of level.platforms) {
          if (e.y + e.h >= p.y && e.y + e.h <= p.y + p.h + 2 &&
              e.x + e.w > p.x && e.x < p.x + p.w) {
            onPlat = true;
            if (e.x <= p.x) { e.dir = 1; }
            if (e.x + e.w >= p.x + p.w) { e.dir = -1; }
          }
        }
      }
    }

    e.animTimer++;
    if (e.animTimer > 10) { e.animTimer=0; e.animFrame=(e.animFrame+1)%2; }

    // Player vs enemy collision
    if (!player.dead && player.invincible === 0 && rectsOverlap(player, e)) {
      // Stomp?
      if (player.vy > 0 && player.y + player.h < e.y + e.h/2 + 8) {
        e.dead = true;
        e.deadTimer = 30;
        player.vy = -8;
        score += 200;
        updateUI();
        spawnParticles(e.x+e.w/2, e.y+e.h/2, C.enemy, 10);
        glitchTimer = 15;
      } else {
        playerDie();
      }
    }
  }
  enemies = enemies.filter(e => !e.remove);

  // Coins
  for (const c of coins) {
    if (!c.collected) {
      c.anim += 0.08;
      if (rectsOverlap(player, c)) {
        c.collected = true;
        score += 100;
        updateUI();
        spawnParticles(c.x+c.w/2, c.y+c.h/2, C.coin, 8);
      }
    }
  }

  // Goal
  goal.anim += 0.05;
  if (rectsOverlap(player, goal)) {
    gameState = 'win';
    score += 1000;
    updateUI();
    spawnParticles(goal.x+goal.w/2, goal.y+goal.h/2, C.magenta, 20);
    overlay.innerHTML = `
      <h1 style="font-size:42px;color:#ffffff;text-shadow:0 0 20px #ffffff,0 0 40px #ffffff88">YOU WIN!</h1>
      <div class="sub">LEVEL COMPLETE // +1000 CREDITS</div>
      <div class="controls-hint">[ SPACE ] NEXT RUN</div>
    `;
    overlay.style.display = 'block';
  }

  // Particles
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= p.decay;
  }
  particles = particles.filter(p => p.life > 0);

  draw();
  requestAnimationFrame(update);
}

function rectsOverlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x &&
         a.y < b.y+b.h && a.y+a.h > b.y;
}

function playerDie() {
  if (player.invincible > 0) return;
  lives--;
  updateUI();
  spawnParticles(player.x+player.w/2, player.y+player.h/2, C.cyan, 16);
  glitchTimer = 40;
  if (lives <= 0) {
    gameState = 'dead';
    overlay.innerHTML = `
      <h1 style="color:#ff3300;text-shadow:0 0 20px #ff3300,0 0 40px #ff3300">FLATLINED</h1>
      <div class="sub" style="color:#ff6600">NEURAL LINK SEVERED</div>
      <div class="controls-hint">[ SPACE ] RECONNECT</div>
    `;
    overlay.style.display = 'block';
  } else {
    player.invincible = 120;
    player.x = LEVELS[currentLevel].playerStart.x;
    player.y = LEVELS[currentLevel].playerStart.y;
    player.vx = 0; player.vy = 0;
  }
}

function updateUI() {
  scoreDisplay.textContent = String(score).padStart(6,'0');
  const hearts = ['♥ ♥ ♥','♥ ♥ ☆','♥ ☆ ☆','☆ ☆ ☆'];
  livesDisplay.textContent = hearts[Math.max(0, 3-lives)];
}

// ─── DRAW ─────────────────────────────────────────────────
let bgStars = Array.from({length:80}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  size: Math.random()*1.5+0.3,
  twinkle: Math.random()*Math.PI*2
}));

function draw() {
  // BG — Bright apocalyptic sky (harsh daylight through ash and smoke)
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0,    '#e8c060');
  skyGrad.addColorStop(0.18, '#f0a030');
  skyGrad.addColorStop(0.38, '#ff7010');
  skyGrad.addColorStop(0.6,  '#cc4400');
  skyGrad.addColorStop(0.82, '#7a1a00');
  skyGrad.addColorStop(1,    '#1a0500');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0,0,W,H);

  // Blinding sun bleed — top-left, scorching through the haze
  const sunGrad = ctx.createRadialGradient(160, -20, 0, 160, -20, 300);
  sunGrad.addColorStop(0,   'rgba(255,240,180,0.7)');
  sunGrad.addColorStop(0.4, 'rgba(255,160,40,0.3)');
  sunGrad.addColorStop(1,   'rgba(255,80,0,0)');
  ctx.fillStyle = sunGrad;
  ctx.fillRect(0,0,W,H);

  // Ash/smoke clouds drifting across sky
  const t0 = Date.now()/1000;
  ctx.save();
  for (let i=0; i<6; i++) {
    const cx = ((t0*18*(i%2===0?1:-1) + i*170) % (W+300)) - 150;
    const cy = 40 + i*22;
    const rw = 120 + i*30;
    const rh = 28 + i*8;
    ctx.globalAlpha = 0.18 + i*0.04;
    ctx.fillStyle = i%2===0 ? '#3a1a00' : '#1a0800';
    ctx.beginPath();
    ctx.ellipse(cx, cy, rw, rh, 0, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  // Distant haze/smog band
  ctx.save();
  ctx.globalAlpha = 0.35;
  const hazeGrad = ctx.createLinearGradient(0, 160, 0, 220);
  hazeGrad.addColorStop(0, 'rgba(200,80,0,0)');
  hazeGrad.addColorStop(0.5,'rgba(180,60,0,0.6)');
  hazeGrad.addColorStop(1, 'rgba(200,80,0,0)');
  ctx.fillStyle = hazeGrad;
  ctx.fillRect(0, 160, W, 60);
  ctx.restore();

  // Dust particles floating in air
  for (const s of bgStars) {
    s.twinkle += 0.008;
    s.x -= 0.15;
    if (s.x < 0) s.x = W;
    const a = 0.15 + Math.sin(s.twinkle)*0.1;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = '#ffaa44';
    ctx.fillRect(s.x, s.y, s.size*1.2, s.size*0.6);
    ctx.restore();
  }

  // Perspective grid
  drawGrid();

  // Glitch effect
  if (glitchTimer > 0) {
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = C.magenta;
    const sliceY = Math.random()*H;
    const sliceH = 10 + Math.random()*20;
    ctx.fillRect(0, sliceY, W, sliceH);
    ctx.globalAlpha = 0.1;
    ctx.fillStyle = C.cyan;
    ctx.fillRect(Math.random()*20-10, Math.random()*H, W, 4);
    ctx.restore();
  }

  // City silhouette
  drawCitySilhouette();

  // VIVERSE cyberpunk sign — drawn AFTER buildings so it floats in front
  drawViverseSign();

  // Platforms
  for (const p of level.platforms) {
    drawPlatform(p);
  }

  // Goal portal
  drawGoal();

  // Coins
  for (const c of coins) {
    if (!c.collected) drawCoin(c);
  }

  // Enemies
  for (const e of enemies) {
    drawEnemy(e);
  }

  // Player
  if (gameState === 'playing') {
    drawPlayer();
  }

  // Particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    ctx.restore();
  }

  // Scanline overlay on canvas
  ctx.save();
  ctx.globalAlpha = 0.06;
  for (let y=0; y<H; y+=4) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, y, W, 2);
  }
  ctx.restore();
}

function drawGrid() {
  const horizon = 180;
  const vanishX = W/2;
  ctx.save();
  ctx.strokeStyle = '#8b2200';
  ctx.lineWidth = 0.8;
  ctx.globalAlpha = 0.6;

  // Vertical lines
  for (let i=0; i<=20; i++) {
    const t = i/20;
    const bx = t * W;
    const tx = vanishX + (bx - vanishX) * 0.15;
    ctx.beginPath();
    ctx.moveTo(tx, horizon);
    ctx.lineTo(bx, H);
    ctx.stroke();
  }
  // Horizontal lines
  for (let i=0; i<=10; i++) {
    const t = i/10;
    const y = horizon + (H - horizon) * (t*t);
    const spread = (y - horizon)/(H - horizon);
    ctx.beginPath();
    ctx.moveTo(vanishX - spread*(W/2), y);
    ctx.lineTo(vanishX + spread*(W/2), y);
    ctx.stroke();
  }
  ctx.restore();
}

function drawViverseSign() {
  const t = Date.now()/1000;
  const flicker = 0.7 + Math.sin(t*7)*0.15 + Math.sin(t*13)*0.1;

  // Sign is centered at y=300 — just above the building rooftops (tallest ~y=30, most cluster 60-170)
  // This puts the sign hugging the skyline perfectly
  const signY = 75;    // near top of screen, overlaying building tops

  ctx.save();
  ctx.font = 'bold 88px "Orbitron", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Wide outer glow
  for (let i=6; i>0; i--) {
    ctx.globalAlpha = (0.06 * flicker) * i;
    ctx.fillStyle = i%2===0 ? C.magenta : C.cyan;
    ctx.shadowColor = i%2===0 ? C.magenta : C.cyan;
    ctx.shadowBlur = 30;
    ctx.fillText('VIVERSE', W/2 + i*0.5, signY + i*0.5);
  }

  // Magenta color layer
  ctx.globalAlpha = 0.5 * flicker;
  ctx.fillStyle = C.magenta;
  ctx.shadowColor = C.magenta;
  ctx.shadowBlur = 40;
  ctx.fillText('VIVERSE', W/2, signY);

  // Bright white sharp text on top
  ctx.globalAlpha = 0.92 * flicker;
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = C.magenta;
  ctx.shadowBlur = 20;
  ctx.fillText('VIVERSE', W/2, signY);

  // Decorative bars flanking sign
  const tw = 340;
  ctx.globalAlpha = 0.45 * flicker;
  ctx.strokeStyle = C.cyan;
  ctx.shadowColor = C.cyan;
  ctx.shadowBlur = 8;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(W/2 - tw, signY - 45); ctx.lineTo(W/2 + tw, signY - 45); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(W/2 - tw, signY + 45); ctx.lineTo(W/2 + tw, signY + 45); ctx.stroke();

  // Neural network subtitle
  ctx.globalAlpha = 0.65 * flicker;
  ctx.font = '11px "Share Tech Mono", monospace';
  ctx.fillStyle = C.cyan;
  ctx.shadowColor = C.cyan;
  ctx.shadowBlur = 10;
  ctx.fillText('◈  NEURAL NETWORK // EST. 1987  ◈', W/2, signY + 48);



  ctx.restore();
}

function drawCitySilhouette() {
  ctx.save();

  const buildings = [
    {x:0,w:60,h:120},{x:55,w:40,h:80},{x:90,w:50,h:150},
    {x:135,w:35,h:100},{x:165,w:55,h:130},{x:215,w:30,h:90},
    {x:240,w:60,h:160},{x:295,w:40,h:110},{x:330,w:50,h:140},
    {x:375,w:35,h:85},{x:405,w:70,h:170},{x:470,w:45,h:120},
    {x:510,w:55,h:145},{x:560,w:40,h:100},{x:595,w:65,h:165},
    {x:655,w:35,h:90},{x:685,w:50,h:135},{x:730,w:45,h:115},
    {x:770,w:60,h:150},{x:825,w:40,h:95},{x:860,w:45,h:130},
  ];

  for (const b of buildings) {
    // Dark silhouette — nearly black against bright orange sky
    ctx.globalAlpha = 1.0;
    ctx.fillStyle = '#0d0500';
    ctx.fillRect(b.x, 200 - b.h, b.w, b.h);

    // Some buildings have crumbled tops (jagged)
    if (b.w > 45) {
      ctx.fillStyle = '#0d0500';
      for (let cx2=b.x; cx2<b.x+b.w; cx2+=7) {
        const crumble = Math.sin(cx2*0.9+b.h)*4;
        ctx.fillRect(cx2, 200-b.h-crumble, 5, crumble+2);
      }
    }

    // Windows — mostly dark/dead, a few glowing amber (fire/emergency)
    for (let wx=b.x+4; wx<b.x+b.w-4; wx+=8) {
      for (let wy=200-b.h+6; wy<195; wy+=10) {
        const roll = Math.sin(wx*3.7+wy*1.3+b.h) * 0.5 + 0.5;
        if (roll > 0.75) {
          // Burning orange window
          ctx.globalAlpha = 0.55;
          ctx.fillStyle = '#ff6600';
          ctx.shadowColor = '#ff4400';
          ctx.shadowBlur = 6;
          ctx.fillRect(wx, wy, 4, 5);
        } else if (roll > 0.65) {
          // Faint ember glow
          ctx.globalAlpha = 0.2;
          ctx.fillStyle = '#ff2200';
          ctx.shadowBlur = 0;
          ctx.fillRect(wx, wy, 4, 5);
        }
      }
    }

    // Rim light on building edges from the orange sky
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#ff6600';
    ctx.shadowBlur = 0;
    ctx.fillRect(b.x, 200-b.h, 2, b.h);
    ctx.fillRect(b.x+b.w-2, 200-b.h, 2, b.h);
  }

  // Ground smog/smoke at base of buildings
  ctx.globalAlpha = 0.5;
  const smogGrad = ctx.createLinearGradient(0, 185, 0, 215);
  smogGrad.addColorStop(0, 'rgba(30,10,0,0)');
  smogGrad.addColorStop(0.5,'rgba(20,8,0,0.8)');
  smogGrad.addColorStop(1, 'rgba(10,4,0,0)');
  ctx.fillStyle = smogGrad;
  ctx.fillRect(0, 185, W, 30);

  ctx.restore();
}

function drawPlatform(p) {
  ctx.save();
  // Platform body
  const grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y+p.h);
  grad.addColorStop(0, '#2a0a00');
  grad.addColorStop(1, '#140500');
  ctx.fillStyle = grad;
  ctx.fillRect(p.x, p.y, p.w, p.h);

  // Top glowing edge
  ctx.strokeStyle = C.magenta;
  ctx.lineWidth = 2;
  ctx.shadowColor = C.magenta;
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.lineTo(p.x+p.w, p.y);
  ctx.stroke();

  // Subtle circuit pattern
  ctx.globalAlpha = 0.25;
  ctx.strokeStyle = C.cyan;
  ctx.lineWidth = 0.5;
  ctx.shadowBlur = 0;
  for (let x=p.x+10; x<p.x+p.w-5; x+=20) {
    ctx.beginPath();
    ctx.moveTo(x, p.y+4);
    ctx.lineTo(x+8, p.y+4);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(x+8, p.y+4, 2, 0, Math.PI*2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.invincible/5)%2 === 0) return;
  const {x, y, w, h, facing, animFrame} = player;
  const cx = x + w/2;

  ctx.save();
  ctx.translate(cx, y + h/2);
  ctx.scale(facing, 1);

  const t = Date.now()/1000;

  // Shadow/glow
  ctx.shadowColor = C.cyan;
  ctx.shadowBlur = 20;

  // Body
  ctx.fillStyle = '#001a2e';
  ctx.fillRect(-w/2, -h/2, w, h);

  // Neon suit lines
  ctx.strokeStyle = C.cyan;
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 10;
  // Shoulders
  ctx.beginPath();
  ctx.moveTo(-w/2, -h/2+4);
  ctx.lineTo(w/2, -h/2+4);
  ctx.stroke();
  // Torso stripe
  ctx.beginPath();
  ctx.moveTo(0, -h/2+4);
  ctx.lineTo(0, h/2-8);
  ctx.stroke();
  // Belt
  ctx.strokeStyle = C.magenta;
  ctx.shadowColor = C.magenta;
  ctx.beginPath();
  ctx.moveTo(-w/2, 2);
  ctx.lineTo(w/2, 2);
  ctx.stroke();

  // Legs (animated)
  const legOffset = Math.sin(animFrame * Math.PI/2) * 5;
  ctx.strokeStyle = C.cyan;
  ctx.shadowColor = C.cyan;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-4, h/2-8);
  ctx.lineTo(-4+legOffset, h/2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(4, h/2-8);
  ctx.lineTo(4-legOffset, h/2);
  ctx.stroke();

  // Head
  ctx.fillStyle = '#001a2e';
  ctx.strokeStyle = C.cyan;
  ctx.shadowColor = C.cyan;
  ctx.shadowBlur = 12;
  ctx.lineWidth = 1.5;
  ctx.fillRect(-8, -h/2-12, 16, 14);
  ctx.strokeRect(-8, -h/2-12, 16, 14);

  // Visor (glowing eye)
  ctx.fillStyle = C.magenta;
  ctx.shadowColor = C.magenta;
  ctx.shadowBlur = 15;
  ctx.fillRect(-5, -h/2-8, 14, 4);

  // Antenna
  ctx.strokeStyle = C.magenta;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(4, -h/2-12);
  ctx.lineTo(4, -h/2-20);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(4, -h/2-20, 2, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function drawEnemy(e) {
  if (e.dead) {
    ctx.save();
    ctx.globalAlpha = e.deadTimer/30;
    ctx.fillStyle = C.enemy;
    ctx.shadowColor = C.enemy;
    ctx.shadowBlur = 20;
    ctx.fillRect(e.x, e.y + e.h - 8, e.w, 8);
    ctx.restore();
    return;
  }

  const cx = e.x + e.w/2;
  const cy = e.y + e.h/2;
  const t = Date.now()/1000;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(e.dir, 1);

  // Glow
  ctx.shadowColor = C.enemy;
  ctx.shadowBlur = 15;

  // Body — spider/drone shape
  ctx.fillStyle = '#1a0000';
  ctx.strokeStyle = C.enemy;
  ctx.lineWidth = 1.5;

  // Core
  ctx.beginPath();
  ctx.arc(0, 0, 10, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();

  // Eye
  ctx.fillStyle = '#ff6600';
  ctx.shadowColor = '#ff6600';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(4, -2, 4, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(5, -2, 2, 0, Math.PI*2);
  ctx.fill();

  // Legs (animated)
  ctx.strokeStyle = C.enemy;
  ctx.shadowColor = C.enemy;
  ctx.shadowBlur = 8;
  ctx.lineWidth = 1.5;
  const legAnim = Math.sin(t * 8 + e.animFrame) * 3;
  for (let i=0; i<3; i++) {
    const ly = -4 + i*4;
    ctx.beginPath();
    ctx.moveTo(-10, ly);
    ctx.lineTo(-18, ly + legAnim - 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(10, ly);
    ctx.lineTo(18, ly - legAnim + 2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawCoin(c) {
  const t = Date.now()/1000;
  const bob = Math.sin(t*3 + c.x*0.1) * 3;
  const pulse = 0.8 + Math.sin(t*5 + c.x*0.1)*0.2;

  ctx.save();
  ctx.translate(c.x + c.w/2, c.y + c.h/2 + bob);

  ctx.shadowColor = C.coin;
  ctx.shadowBlur = 15 * pulse;
  ctx.strokeStyle = C.coin;
  ctx.fillStyle = '#2a2a00';
  ctx.lineWidth = 2;

  // Hexagonal credit chip
  ctx.beginPath();
  for (let i=0; i<6; i++) {
    const a = (Math.PI/3)*i - Math.PI/6;
    const r = 7 * pulse;
    i===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Inner symbol
  ctx.fillStyle = C.coin;
  ctx.shadowBlur = 5;
  ctx.font = 'bold 7px "Share Tech Mono"';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('₿', 0, 0);

  ctx.restore();
}

function drawGoal() {
  const t = Date.now()/1000;
  const {x, y, w, h} = goal;
  const pulse = Math.sin(t*3)*0.3 + 0.7;

  ctx.save();

  // Portal glow
  ctx.shadowColor = C.magenta;
  ctx.shadowBlur = 30 * pulse;

  // Portal frame
  ctx.strokeStyle = C.magenta;
  ctx.lineWidth = 3;
  ctx.strokeRect(x, y, w, h);

  // Inner portal shimmer
  const grad = ctx.createLinearGradient(x, y, x, y+h);
  grad.addColorStop(0, `rgba(255,0,255,${0.3*pulse})`);
  grad.addColorStop(0.5, `rgba(0,255,255,${0.2*pulse})`);
  grad.addColorStop(1, `rgba(255,0,255,${0.3*pulse})`);
  ctx.fillStyle = grad;
  ctx.fillRect(x+3, y+3, w-6, h-6);

  // Scanlines through portal
  ctx.globalAlpha = 0.4;
  ctx.strokeStyle = C.cyan;
  ctx.lineWidth = 0.5;
  for (let py=y+4; py<y+h; py+=6) {
    ctx.beginPath();
    ctx.moveTo(x+3, py + Math.sin(t*5+py)*2);
    ctx.lineTo(x+w-3, py + Math.sin(t*5+py)*2);
    ctx.stroke();
  }

  // Label
  ctx.globalAlpha = pulse;
  ctx.fillStyle = C.magenta;
  ctx.shadowColor = C.magenta;
  ctx.shadowBlur = 10;
  ctx.font = 'bold 8px "Orbitron"';
  ctx.textAlign = 'center';
  ctx.fillText('JACK', x+w/2, y-8);
  ctx.fillText('IN', x+w/2, y-1);

  ctx.restore();
}

// ─── INPUT ────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.code] = true;

  if (e.code === 'Space') {
    if (gameState === 'title') {
      gameState = 'playing';
      overlay.style.display = 'none';
      initLevel();
    } else if (gameState === 'dead') {
      lives = 3;
      score = 0;
      updateUI();
      initLevel();
      gameState = 'playing';
      overlay.style.display = 'none';
    } else if (gameState === 'win') {
      initLevel();
      gameState = 'playing';
      overlay.style.display = 'none';
    }
  }
  e.preventDefault();
});

document.addEventListener('keyup', e => {
  keys[e.code] = false;
});

// ─── BOOT ────────────────────────────────────────────────
initLevel();
requestAnimationFrame(t => { lastTime = t; update(t); });
</script>
